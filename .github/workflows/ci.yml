name: CI Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Dependency Integrity & Typosquatting Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Typosquatting Detection Engine
        run: |
          python -c '
          import os, re, sys

          # 1. Calculate Levenshtein Distance between package names
          def levenshtein(s1, s2):
              if len(s1) < len(s2): return levenshtein(s2, s1)
              if len(s2) == 0: return len(s1)
              prev_row = list(range(len(s2) + 1))
              for i, c1 in enumerate(s1):
                  curr_row = [i + 1]
                  for j, c2 in enumerate(s2):
                      insertions = prev_row[j + 1] + 1
                      deletions = curr_row[j] + 1
                      substitutions = prev_row[j] + (c1 != c2)
                      curr_row.append(min(insertions, deletions, substitutions))
                  prev_row = curr_row
              return prev_row[-1]

          # 2. Approved/Popular Packages Whitelist
          whitelist = ["requests", "flask", "werkzeug", "jinja2", "click", "colorama", "itsdangerous", "markupsafe"]

          # 3. Parse requirements.txt
          failed = False
          if os.path.exists("requirements.txt"):
              with open("requirements.txt") as f:
                  for line in f:
                      # Skip comments, empty lines, and hashes
                      line = line.strip()
                      if not line or line.startswith("#") or line.startswith("-"):
                          continue
                      
                      # Extract package name (everything before ==, <, >, etc.)
                      match = re.match(r"^([a-zA-Z0-9_\-]+)", line)
                      if match:
                          package = match.group(1).lower()
                          
                          # Ignore our own local package
                          if "utils_lib" in package:
                              continue
                          
                          # Check against the whitelist
                          for safe_pkg in whitelist:
                              dist = levenshtein(package, safe_pkg)
                              # If distance is 1 or 2, it is highly likely a typosquatted name!
                              if 0 < dist <= 2:
                                  print(f"\n[!] SECURITY EXCEPTION: Typosquatting detected!")
                                  print(f"    Suspect: \"{package}\" closely resembles approved package \"{safe_pkg}\" (distance: {dist}).")
                                  failed = True

          if failed:
              print("\n[FAIL] Pull Request rejected due to dependency integrity failures.")
              sys.exit(1)
          else:
              print("[PASS] No typosquatting anomalies found.")
          '

      - name: Run Install Check
        run: |
          pip install -r requirements.txt --require-hashes || pip install -r requirements.txt